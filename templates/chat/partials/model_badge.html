<form method="post" action="{% url 'chat:conversation_change_model' conversation.pk %}" class="d-flex gap-1 align-items-center">
    {% csrf_token %}
    <select name="model" class="form-select form-select-sm" style="max-width:200px">
        {% for model_id, model_name in available_models %}
        <option value="{{ model_id }}" {% if conversation.model == model_id %}selected{% endif %}>{{ model_name }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="btn btn-sm btn-outline-primary">Cambiar</button>
</form>
