<div class="list-group-item list-group-item-action conversation-item d-flex justify-content-between align-items-center py-3" id="conv-{{ conv.pk }}">
    <a href="{% url 'chat:conversation_detail' conv.pk %}" class="text-decoration-none text-dark flex-grow-1">
        <div class="d-flex align-items-center gap-2">
            {% if conv.is_pinned %}<i class="bi bi-pin-fill text-warning"></i>{% endif %}
            <span class="fw-semibold">{{ conv.title }}</span>
        </div>
        <small class="text-muted">{{ conv.updated_at|date:"d/m/Y H:i" }} · {{ conv.messages.count }} mensajes · <span class="badge bg-secondary">{{ conv.model|truncatechars:25 }}</span></small>
    </a>
    <div class="dropdown ms-2">
        <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="dropdown">
            <i class="bi bi-three-dots-vertical"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <button class="dropdown-item"
                    hx-post="{% url 'chat:conversation_pin' conv.pk %}"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-target="#conv-{{ conv.pk }}"
                    hx-swap="outerHTML"
                    hx-on::after-request="location.reload()">
                    <i class="bi bi-pin{% if conv.is_pinned %}-fill{% endif %}"></i>
                    {% if conv.is_pinned %}Desfijar{% else %}Fijar{% endif %}
                </button>
            </li>
            <li>
                <button class="dropdown-item"
                    hx-post="{% url 'chat:conversation_archive' conv.pk %}"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-on::after-request="location.reload()">
                    <i class="bi bi-archive"></i>
                    {% if conv.is_archived %}Desarchivar{% else %}Archivar{% endif %}
                </button>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <button class="dropdown-item text-danger"
                    hx-post="{% url 'chat:conversation_delete' conv.pk %}"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-confirm="¿Eliminar esta conversación?"
                    hx-on::after-request="document.getElementById('conv-{{ conv.pk }}').remove()">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </li>
        </ul>
    </div>
</div>
