{% extends "base.html" %}
{% block title %}Eliminar conversación - ChatLLM{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5 text-center">
                    <div class="fs-1 mb-3">🗑️</div>
                    <h4 class="mb-3">¿Eliminar conversación?</h4>
                    <p class="text-muted mb-4">
                        Se eliminará <strong>{{ conversation.title }}</strong> y todos sus mensajes.
                        Esta acción no se puede deshacer.
                    </p>
                    <div class="d-flex gap-2 justify-content-center">
                        <form method="post" action="{% url 'chat:conversation_delete' conversation.pk %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </form>
                        <a href="{% url 'chat:conversation_list' %}" class="btn btn-outline-secondary px-4">
                            Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
